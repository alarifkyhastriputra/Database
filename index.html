<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CBT SMA 1 Bengkayang</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  font-family: Arial;
  background: #f0f4f9;
  margin: 0;
}

.header {
  background: #673ab7;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

.card {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  padding: 10px;
  background: #673ab7;
  color: white;
  border: none;
  border-radius: 8px;
  width: 100%;
  margin-top: 5px;
}
</style>
</head>

<body>

<div class="header">📘 SMA NEGERI 1 BENGKAYANG</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
  <input id="nama" placeholder="Masukkan Nama">

  <select id="mode" onchange="modeChange()">
    <option value="murid">Login sebagai Murid</option>
    <option value="guru">Login sebagai Guru</option>
  </select>

  <input id="pass" placeholder="Password Guru" style="display:none;">
  <button onclick="login()">Masuk</button>
</div>

<!-- MENU -->
<div id="menu" style="display:none;"></div>

<!-- CONTENT -->
<div id="content"></div>

</div>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCZIDtUteM2MiESDJd35gaKPHX_Ht1zL6s",
  authDomain: "projectchat01-d16bc.firebaseapp.com",
  databaseURL: "https://projectchat01-d16bc-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="", role="", currentMapel="";

// MODE SWITCH
function modeChange(){
  pass.style.display = (mode.value=="guru") ? "block":"none";
}

// LOGIN
function login(){
  user = nama.value.trim();
  role = mode.value;

  if(user=="") return alert("Nama wajib diisi!");

  if(role=="guru"){
    if(pass.value!="ADMIN123"){
      alert("Password salah!");
      return;
    }
  }

  login.style.display="none";
  menu.style.display="block";

  if(role=="guru"){
    menu.innerHTML=`
      <h3>👨‍🏫 ${user}</h3>
      <button onclick="buatMapel()">➕ Buat Mapel</button>
      <button onclick="lihatHasil()">📊 Lihat Hasil</button>
    `;
  } else {
    menu.innerHTML=`<h3>👨‍🎓 ${user}</h3>`;
    loadMapel();
  }
}

// ================= GURU =================

// BUAT MAPEL
function buatMapel(){
  content.innerHTML=`
    <div class="card">
      <input id="namaMapel" placeholder="Nama Mapel">
      <button onclick="simpanMapel()">Buat Mapel</button>
    </div>
  `;
}

function simpanMapel(){
  let ref=db.ref("ulangan/mapel").push();
  ref.set({nama:namaMapel.value});
  currentMapel=ref.key;

  tambahSoal();
}

// TAMBAH SOAL
function tambahSoal(){
  content.innerHTML+=`
    <div class="card soalCard">
      <input class="soal" placeholder="Soal">
      <input class="a" placeholder="Pilihan A">
      <input class="b" placeholder="Pilihan B">
      <input class="c" placeholder="Pilihan C">
      <input class="d" placeholder="Pilihan D">
      <select class="jawaban">
        <option>A</option><option>B</option>
        <option>C</option><option>D</option>
      </select>
    </div>
    <button onclick="tambahSoal()">+ Tambah Soal</button>
    <button onclick="simpanSoal()">💾 Simpan Semua</button>
  `;
}

function simpanSoal(){
  let cards=document.querySelectorAll(".soalCard");

  cards.forEach(c=>{
    let data={
      soal:c.querySelector(".soal").value,
      a:c.querySelector(".a").value,
      b:c.querySelector(".b").value,
      c:c.querySelector(".c").value,
      d:c.querySelector(".d").value,
      benar:c.querySelector(".jawaban").value
    };

    if(data.soal){
      db.ref("ulangan/mapel/"+currentMapel+"/soal").push(data);
    }
  });

  alert("Soal berhasil disimpan!");
}

// LIHAT HASIL
function lihatHasil(){
  db.ref("ulangan/hasil").on("value", snap=>{
    let html="";

    snap.forEach(s=>{
      let d=s.val();
      html+=`
        <div class="card">
          <b>${d.nama}</b> - ${d.mapel}<br>
          Nilai: ${d.nilai}<br>
          Jawaban: ${d.jawaban.join(", ")}
        </div>
      `;
    });

    content.innerHTML=html;
  });
}

// ================= MURID =================

// PILIH MAPEL
function loadMapel(){
  db.ref("ulangan/mapel").on("value", snap=>{
    let html="<h3>Pilih Mapel</h3>";

    snap.forEach(s=>{
      html+=`
        <div class="card">
          ${s.val().nama}
          <button onclick="mulaiSoal('${s.key}','${s.val().nama}')">Mulai</button>
        </div>
      `;
    });

    content.innerHTML=html;
  });
}

// MULAI UJIAN
function mulaiSoal(id,namaMapel){
  currentMapel=id;

  db.ref("ulangan/mapel/"+id+"/soal").once("value", snap=>{
    let html=`<h3>${namaMapel}</h3>`;
    let i=0;

    snap.forEach(s=>{
      let d=s.val();
      html+=`
        <div class="card">
          ${d.soal}<br>
          <input type="radio" name="q${i}" value="A"> ${d.a}<br>
          <input type="radio" name="q${i}" value="B"> ${d.b}<br>
          <input type="radio" name="q${i}" value="C"> ${d.c}<br>
          <input type="radio" name="q${i}" value="D"> ${d.d}<br>
        </div>
      `;
      i++;
    });

    html+=`<button onclick="kirimJawaban('${namaMapel}')">Selesai</button>`;
    content.innerHTML=html;
  });
}

// KIRIM JAWABAN
function kirimJawaban(namaMapel){
  db.ref("ulangan/mapel/"+currentMapel+"/soal").once("value", snap=>{
    let i=0, benar=0, total=0;
    let jawaban=[];

    snap.forEach(s=>{
      let kunci=s.val().benar;
      let pilih=document.querySelector(`input[name=q${i}]:checked`);
      let j=pilih?pilih.value:"-";

      jawaban.push(j);
      if(j==kunci) benar++;
      total++;
      i++;
    });

    let nilai=Math.round((benar/total)*100);

    db.ref("ulangan/hasil").push({
      nama:user,
      mapel:namaMapel,
      nilai:nilai,
      jawaban:jawaban
    });

    content.innerHTML=`<h2>🎉 Nilai kamu: ${nilai}</h2>`;
  });
}
</script>

</body>
  </html>

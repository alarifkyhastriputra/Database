<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hercu OTG</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
:root{
  --bg:#f4f6fb;
  --card:#fff;
  --text:#1e1e2f;
  --primary:#6c5ce7;
}
body.dark{--bg:#121212;--card:#1e1e2f;--text:#fff;}
body{margin:0;background:var(--bg);color:var(--text);font-family:sans-serif;}

.header{
  padding:18px;text-align:center;
  background:var(--primary);color:#fff;font-weight:bold;
  position:relative;
}
.mode,.lock{position:absolute;top:15px;cursor:pointer;}
.mode{left:15px;} .lock{right:15px;}

.container{max-width:520px;margin:auto;padding:15px;}
.card{background:var(--card);padding:16px;border-radius:12px;margin-bottom:10px;cursor:pointer;}

input,select,button{
  width:100%;padding:12px;margin-top:8px;border-radius:10px;border:1px solid #ddd;
}
button{background:var(--primary);color:#fff;border:none;cursor:pointer;}

.option{background:#eef;padding:10px;margin-top:5px;border-radius:8px;}

#overlay{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);}
#popupGuru{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;max-width:400px;
}
</style>
</head>

<body>

<div class="header">
HERCU OTG
<span class="mode" onclick="toggleMode()">🌙</span>
<span class="lock" onclick="bukaGuru()">🔒</span>
</div>

<div id="overlay" onclick="tutupGuru()"></div>

<div id="popupGuru" class="card">
<h3>Login Guru</h3>
<input id="guruNama" placeholder="Nama">
<input id="guruPass" type="password" placeholder="Password">
<button onclick="loginGuru()">Masuk</button>
<button onclick="tutupGuru()">Batal</button>
</div>

<div class="container">

<div id="loginBox" class="card">
<input id="namaInput" placeholder="Nama">

<select id="kelasSelect">
<option>10A</option><option>10B</option><option>10C</option>
<option>10D</option><option>10E</option><option>10F</option><option>10G</option>
<option>11A</option><option>11B</option><option>11C</option>
<option>11D</option><option>11E</option><option>11F</option><option>11G</option>
<option>12A</option><option>12B</option><option>12C</option>
<option>12D</option><option>12E</option><option>12F</option><option>12G</option>
</select>

<button onclick="login()">Masuk</button>
</div>

<div id="menuBox"></div>
<div id="contentBox"></div>

</div>

<script>
const firebaseConfig={
  apiKey:"AIzaSy...",
  databaseURL:"https://projectchat01-d16bc-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user="",kelas="",role="",currentMapel="",soalRandom=[],sudahKirim=false;

// DARK MODE
function toggleMode(){document.body.classList.toggle("dark");}

// LOGIN
function login(){
  user=namaInput.value.trim();
  kelas=kelasSelect.value;
  role="murid";
  if(!user)return alert("Isi nama!");
  loginBox.style.display="none";
  loadMapel();
}

// GURU LOGIN
function bukaGuru(){overlay.style.display="block";popupGuru.style.display="block";}
function tutupGuru(){overlay.style.display="none";popupGuru.style.display="none";}

function loginGuru(){
  if(guruPass.value!=="ADMIN123")return alert("Password salah");
  user=guruNama.value;
  role="guru";
  loginBox.style.display="none";
  tutupGuru();

  menuBox.innerHTML=`
  <div class="card">
  👨‍🏫 ${user}
  <button onclick="buatMapel()">➕ Buat Mapel</button>
  <button onclick="kelolaMapel()">⚙️ Kelola Mapel</button>
  <button onclick="lihatHasil()">📊 Hasil</button>
  </div>`;
}

// MAPEL
function buatMapel(){
  contentBox.innerHTML=`
  <div class="card">
  <input id="mapelInput" placeholder="Nama Mapel">
  <button onclick="simpanMapel()">Simpan</button>
  </div>`;
}

function simpanMapel(){
  let nama=mapelInput.value.trim();
  if(!nama)return alert("Isi nama!");
  db.ref("ulangan/mapel").push({nama:nama,lock:false}).then(()=>kelolaMapel());
}

function kelolaMapel(){
  db.ref("ulangan/mapel").once("value",snap=>{
    let data=snap.val(),html="";
    if(!data) html="<div class='card'>Belum ada mapel</div>";
    else for(let id in data){
      let d=data[id];
      html+=`
      <div class="card">
      <b>${d.nama}</b><br>${d.lock?"🔒":"🔓"}
      <button onclick="event.stopPropagation();halamanSoal('${id}')">Kelola Soal</button>
      <button onclick="event.stopPropagation();toggleLock('${id}',${d.lock})">Lock</button>
      <button onclick="event.stopPropagation();hapusMapel('${id}','${d.nama}')">Hapus</button>
      </div>`;
    }
    contentBox.innerHTML=html;
  });
}

function toggleLock(id,lock){
  db.ref("ulangan/mapel/"+id+"/lock").set(!lock).then(()=>kelolaMapel());
}

function hapusMapel(id,nama){
  if(confirm("Hapus mapel + hasil?")){
    db.ref("ulangan/mapel/"+id).remove();
    db.ref("ulangan/hasil/"+nama).remove();
    kelolaMapel();
  }
}

// SOAL (PG + ISIAN)
function halamanSoal(id){
  currentMapel=id;

  db.ref("ulangan/mapel/"+id+"/soal").once("value",snap=>{
    let data=snap.val();

    let html="<div id='soalContainer'></div>";
    html+=`<button onclick="tambahSoal()">➕ Tambah</button>
           <button onclick="simpanSoal()">💾 Simpan</button>
           <button onclick="kelolaMapel()">⬅️</button>`;
    contentBox.innerHTML=html;

    let c=document.getElementById("soalContainer");
    if(!data){c.innerHTML="<div class='card'>Belum ada soal</div>";return;}

    for(let key in data){
      let d=data[key];
      let div=document.createElement("div");
      div.className="card soalCard";

      div.innerHTML=`
      <select class="tipe" onchange="ubahTipe(this)">
        <option value="pg" ${d.tipe=="pg"?"selected":""}>PG</option>
        <option value="isian" ${d.tipe=="isian"?"selected":""}>Isian</option>
      </select>

      <input class="soal" value="${d.soal||""}">

      <div class="pgBox" style="display:${d.tipe=="pg"?"block":"none"}">
        <input class="a" value="${d.a||""}">
        <input class="b" value="${d.b||""}">
        <input class="c" value="${d.c||""}">
        <input class="d" value="${d.d||""}">
        <select class="jawaban">
          <option ${d.benar=="A"?"selected":""}>A</option>
          <option ${d.benar=="B"?"selected":""}>B</option>
          <option ${d.benar=="C"?"selected":""}>C</option>
          <option ${d.benar=="D"?"selected":""}>D</option>
        </select>
      </div>

      <div class="isianBox" style="display:${d.tipe=="isian"?"block":"none"}">
        <input class="jawabanIsian" value="${d.benar||""}">
      </div>

      <button onclick="hapusSoal('${key}')">🗑️</button>`;
      c.appendChild(div);
    }
  });
}

function ubahTipe(el){
  let p=el.parentElement;
  p.querySelector(".pgBox").style.display=(el.value=="pg")?"block":"none";
  p.querySelector(".isianBox").style.display=(el.value=="isian")?"block":"none";
}

function tambahSoal(){
  let c=soalContainer;
  let div=document.createElement("div");
  div.className="card soalCard";
  div.innerHTML=`
  <select class="tipe" onchange="ubahTipe(this)">
    <option value="pg">PG</option><option value="isian">Isian</option>
  </select>
  <input class="soal">
  <div class="pgBox">
    <input class="a"><input class="b"><input class="c"><input class="d">
    <select class="jawaban"><option>A</option><option>B</option><option>C</option><option>D</option></select>
  </div>
  <div class="isianBox" style="display:none;"><input class="jawabanIsian"></div>`;
  c.appendChild(div);
}

function simpanSoal(){
  let cards=document.querySelectorAll(".soalCard");
  db.ref("ulangan/mapel/"+currentMapel+"/soal").remove().then(()=>{
    cards.forEach(c=>{
      let tipe=c.querySelector(".tipe").value;
      let data={soal:c.querySelector(".soal").value,tipe:tipe};

      if(tipe=="pg"){
        data.a=c.querySelector(".a").value;
        data.b=c.querySelector(".b").value;
        data.c=c.querySelector(".c").value;
        data.d=c.querySelector(".d").value;
        data.benar=c.querySelector(".jawaban").value;
      }else{
        data.benar=c.querySelector(".jawabanIsian").value.toLowerCase();
      }

      db.ref("ulangan/mapel/"+currentMapel+"/soal").push(data);
    });
    alert("Tersimpan!");
  });
}

function hapusSoal(id){
  db.ref("ulangan/mapel/"+currentMapel+"/soal/"+id).remove()
  .then(()=>halamanSoal(currentMapel));
}

// MURID
function loadMapel(){
  db.ref("ulangan/mapel").once("value",snap=>{
    let data=snap.val(),html="";
    if(!data) html="<div class='card'>Belum ada mapel</div>";
    else for(let id in data){
      let d=data[id];
      html+=`<div class="card">${d.nama}
      ${!d.lock?`<button onclick="mulaiSoal('${id}','${d.nama}')">Mulai</button>`:"🔒"}</div>`;
    }
    contentBox.innerHTML=html;
  });
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function mulaiSoal(id,nama){
  sudahKirim=false;

  db.ref("ulangan/mapel/"+id+"/soal").once("value",snap=>{
    let data=snap.val();
    if(!data){contentBox.innerHTML="<div class='card'>Belum ada soal</div>";return;}

    soalRandom=Object.values(data);
    shuffle(soalRandom);

    let html="<h3>"+nama+"</h3>";

    soalRandom.forEach((d,i)=>{
      html+=`<div class="card">${i+1}. ${d.soal}`;

      if(d.tipe=="pg"){
        let opsi=[{k:"A",t:d.a},{k:"B",t:d.b},{k:"C",t:d.c},{k:"D",t:d.d}];
        shuffle(opsi);
        opsi.forEach(o=>{
          html+=`<div class="option"><input type="radio" name="q${i}" value="${o.k}">${o.t}</div>`;
        });
      }else{
        html+=`<input id="q${i}">`;
      }

      html+="</div>";
    });

    html+=`<button onclick="kirim('${nama}',${soalRandom.length})">Selesai</button>`;
    contentBox.innerHTML=html;
  });
}

function kirim(mapel,total){
  if(sudahKirim)return;
  sudahKirim=true;

  let benar=0;

  soalRandom.forEach((d,i)=>{
    if(d.tipe=="pg"){
      let p=document.querySelector(`input[name=q${i}]:checked`);
      if(p && p.value===d.benar) benar++;
    }else{
      let isi=document.getElementById("q"+i).value.toLowerCase().trim();
      let arr=d.benar.split(",");
      if(arr.includes(isi)) benar++;
    }
  });

  let nilai=Math.round((benar/total)*100);

  db.ref("ulangan/hasil/"+mapel).push({nama:user,kelas:kelas,nilai:nilai});
  contentBox.innerHTML=`<div class="card"><h2>Nilai: ${nilai}</h2></div>`;
}

// HASIL (LIST → DETAIL)
function lihatHasil(){
  db.ref("ulangan/hasil").once("value",snap=>{
    let data=snap.val();
    let html="<button onclick='hapusSemuaHasil()'>🗑️ Hapus Semua</button>";

    if(!data){
      html+="<div class='card'>Belum ada hasil</div>";
    }else{
      for(let mapel in data){
        let jumlah=Object.keys(data[mapel]).length;
        html+=`<div class="card" onclick="lihatDetailMapel('${mapel}')">
        <b>${mapel}</b><br>${jumlah} murid</div>`;
      }
    }

    contentBox.innerHTML=html;
  });
}

function lihatDetailMapel(mapel){
  db.ref("ulangan/hasil/"+mapel).once("value",snap=>{
    let data=snap.val();
    let html=`
    <button onclick="lihatHasil()">⬅️</button>
    <button onclick="hapusMapelHasil('${mapel}')">🗑️ Hapus Mapel</button>
    <h3>${mapel}</h3>
    `;

    for(let id in data){
      let d=data[id];
      html+=`<div class="card">
      ${d.nama} (${d.kelas}) - ${d.nilai}
      <button onclick="hapusHasil('${mapel}','${id}')">🗑️</button>
      </div>`;
    }

    contentBox.innerHTML=html;
  });
}

function hapusHasil(mapel,id){
  db.ref("ulangan/hasil/"+mapel+"/"+id).remove().then(()=>lihatDetailMapel(mapel));
}

function hapusMapelHasil(mapel){
  if(confirm("Hapus semua hasil mapel ini?")){
    db.ref("ulangan/hasil/"+mapel).remove().then(()=>lihatHasil());
  }
}

function hapusSemuaHasil(){
  if(confirm("Hapus semua hasil?")){
    db.ref("ulangan/hasil").remove().then(()=>lihatHasil());
  }
}

// ANTI CHEAT
function autoSubmit(){
  if(!sudahKirim && soalRandom.length>0){
    sudahKirim=true;
    db.ref("ulangan/hasil/Auto").push({nama:user,kelas:kelas,nilai:0});
    contentBox.innerHTML="<div class='card'><h2>Nilai: 0</h2></div>";
  }
}

document.addEventListener("visibilitychange",()=>{if(document.hidden)autoSubmit();});
window.addEventListener("blur",autoSubmit);
window.addEventListener("pagehide",autoSubmit);

</script>

</body>
</html>

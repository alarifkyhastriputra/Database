<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HERCU OTO</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef2f7;
}

/* HEADER */
.header {
  background: #4f46e5;
  color: white;
  padding: 18px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #4f46e5;
  color: white;
  font-size: 15px;
  font-weight: bold;
}

/* OPTION RADIO */
.option {
  margin-top: 8px;
  padding: 10px;
  background: #f1f5f9;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="header"> HERCU OTO</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Login</h3>
  <input id="namaInput" placeholder="Nama">

  <select id="modeSelect" onchange="modeChange()">
    <option value="murid">Murid</option>
    <option value="guru">Guru</option>
  </select>

  <input id="passInput" placeholder="Password Guru" style="display:none;">
  <button onclick="handleLogin()">Masuk</button>
</div>

<!-- MENU -->
<div id="menuBox" style="display:none;"></div>

<!-- CONTENT -->
<div id="contentBox"></div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCZIDtUteM2MiESDJd35gaKPHX_Ht1zL6s",
  authDomain: "projectchat01-d16bc.firebaseapp.com",
  databaseURL: "https://projectchat01-d16bc-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="", role="", currentMapel="";

// MODE SWITCH
function modeChange(){
  const mode = document.getElementById("modeSelect").value;
  document.getElementById("passInput").style.display =
    (mode=="guru") ? "block":"none";
}

// LOGIN
function handleLogin(){
  user = document.getElementById("namaInput").value.trim();
  role = document.getElementById("modeSelect").value;
  const pass = document.getElementById("passInput").value;

  if(user===""){
    alert("Nama wajib diisi!");
    return;
  }

  if(role==="guru" && pass!=="ADMIN123"){
    alert("Password salah!");
    return;
  }

  document.getElementById("loginBox").style.display="none";
  document.getElementById("menuBox").style.display="block";

  if(role==="guru"){
    document.getElementById("menuBox").innerHTML=`
      <div class="card">
        <b>👨‍🏫 ${user}</b>
        <button onclick="buatMapel()">➕ Buat Mapel</button>
        <button onclick="lihatHasil()">📊 Lihat Hasil</button>
      </div>
    `;
  } else {
    document.getElementById("menuBox").innerHTML=`
      <div class="card">
        <b>👨‍🎓 ${user}</b>
      </div>
    `;
    loadMapel();
  }
}

// ================= GURU =================
function buatMapel(){
  document.getElementById("contentBox").innerHTML=`
    <div class="card">
      <input id="mapelInput" placeholder="Nama Mapel">
      <button onclick="simpanMapel()">Lanjut</button>
    </div>
  `;
}

function simpanMapel(){
  const namaMapel = document.getElementById("mapelInput").value;
  let ref = db.ref("ulangan/mapel").push();
  ref.set({nama:namaMapel});
  currentMapel = ref.key;

  tambahSoal();
}

function tambahSoal(){
  document.getElementById("contentBox").innerHTML+=`
    <div class="card soalCard">
      <input class="soal" placeholder="Soal">
      <input class="a" placeholder="A">
      <input class="b" placeholder="B">
      <input class="c" placeholder="C">
      <input class="d" placeholder="D">
      <select class="jawaban">
        <option>A</option><option>B</option>
        <option>C</option><option>D</option>
      </select>
    </div>
    <button onclick="tambahSoal()">+ Soal</button>
    <button onclick="simpanSoal()">Simpan</button>
  `;
}

function simpanSoal(){
  let cards=document.querySelectorAll(".soalCard");

  cards.forEach(c=>{
    let data={
      soal:c.querySelector(".soal").value,
      a:c.querySelector(".a").value,
      b:c.querySelector(".b").value,
      c:c.querySelector(".c").value,
      d:c.querySelector(".d").value,
      benar:c.querySelector(".jawaban").value
    };

    if(data.soal){
      db.ref("ulangan/mapel/"+currentMapel+"/soal").push(data);
    }
  });

  alert("Soal tersimpan!");
}

// ================= MURID =================
function loadMapel(){
  db.ref("ulangan/mapel").on("value", snap=>{
    let html="<h3>Pilih Mapel</h3>";

    snap.forEach(s=>{
      html+=`
        <div class="card">
          ${s.val().nama}
          <button onclick="mulaiSoal('${s.key}','${s.val().nama}')">Mulai</button>
        </div>
      `;
    });

    document.getElementById("contentBox").innerHTML=html;
  });
}

function mulaiSoal(id,namaMapel){
  currentMapel=id;

  db.ref("ulangan/mapel/"+id+"/soal").once("value", snap=>{
    let html=`<h3>${namaMapel}</h3>`;
    let i=0;

    snap.forEach(s=>{
      let d=s.val();
      html+=`
        <div class="card">
          ${d.soal}
          <div class="option"><input type="radio" name="q${i}" value="A"> ${d.a}</div>
          <div class="option"><input type="radio" name="q${i}" value="B"> ${d.b}</div>
          <div class="option"><input type="radio" name="q${i}" value="C"> ${d.c}</div>
          <div class="option"><input type="radio" name="q${i}" value="D"> ${d.d}</div>
        </div>
      `;
      i++;
    });

    html+=`<button onclick="kirimJawaban('${namaMapel}')">Selesai</button>`;
    document.getElementById("contentBox").innerHTML=html;
  });
}

function kirimJawaban(namaMapel){
  db.ref("ulangan/mapel/"+currentMapel+"/soal").once("value", snap=>{
    let i=0, benar=0, total=0;
    let jawaban=[];

    snap.forEach(s=>{
      let kunci=s.val().benar;
      let pilih=document.querySelector(`input[name=q${i}]:checked`);
      let j=pilih?pilih.value:"-";

      jawaban.push(j);
      if(j==kunci) benar++;
      total++;
      i++;
    });

    let nilai=Math.round((benar/total)*100);

    db.ref("ulangan/hasil").push({
      nama:user,
      mapel:namaMapel,
      nilai:nilai,
      jawaban:jawaban
    });

    document.getElementById("contentBox").innerHTML=
      `<div class="card"><h2>Nilai: ${nilai}</h2></div>`;
  });
}

// ================= HASIL =================
function lihatHasil(){
  db.ref("ulangan/hasil").on("value", snap=>{
    let html="";

    snap.forEach(s=>{
      let d=s.val();
      html+=`
        <div class="card">
          ${d.nama} - ${d.mapel}<br>
          Nilai: ${d.nilai}<br>
          Jawaban: ${d.jawaban.join(", ")}
        </div>
      `;
    });

    document.getElementById("contentBox").innerHTML=html;
  });
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hercu OTG</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{margin:0;background:linear-gradient(135deg,#667eea,#764ba2);}

/* HEADER */
.header{
  padding:18px;
  text-align:center;
  font-size:20px;
  color:white;
  position:relative;
  font-weight:bold;
}

.lock{
  position:absolute;
  right:15px;
  top:15px;
  cursor:pointer;
  font-size:22px;
}

/* CONTAINER */
.container{max-width:500px;margin:auto;padding:12px;}

/* CARD */
.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  animation:fade .3s;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  font-weight:bold;
}

/* OPTION */
.option{
  background:#eef2ff;
  padding:10px;
  margin-top:6px;
  border-radius:10px;
}

/* POPUP */
#overlay{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.5);}
#popupGuru{
  display:none;
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:90%;max-width:400px;
}

/* ANIM */
@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div class="header">
📘 HERCU OTG
<span class="lock" onclick="bukaLoginGuru()">🔒</span>
</div>

<div id="overlay" onclick="tutupLoginGuru()"></div>

<div id="popupGuru" class="card">
<h3>Login Guru</h3>
<input id="guruNama" placeholder="Nama">
<input id="guruPass" type="password" placeholder="Password">
<button onclick="loginGuru()">Masuk</button>
<button onclick="tutupLoginGuru()">Batal</button>
</div>

<div class="container">

<div id="loginBox" class="card">
<input id="namaInput" placeholder="Nama Murid">
<select id="kelasSelect">
<option>10A</option><option>10B</option><option>10C</option>
<option>10D</option><option>10E</option><option>10F</option><option>10G</option>
<option>11A</option><option>11B</option><option>11C</option>
<option>11D</option><option>11E</option><option>11F</option><option>11G</option>
</select>
<button onclick="loginMurid()">Masuk</button>
</div>

<div id="menuBox"></div>
<div id="contentBox"></div>

</div>

<script>
const firebaseConfig = {
  apiKey:"AIzaSyCZIDtUteM2MiESDJd35gaKPHX_Ht1zL6s",
  databaseURL:"https://projectchat01-d16bc-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user="",role="",kelas="",currentMapel="";
let soalRandom=[];

// LOGIN
function loginMurid(){
  user=namaInput.value.trim();
  kelas=kelasSelect.value;
  role="murid";
  if(!user) return alert("Isi nama!");
  loginBox.style.display="none";
  loadMapel();
}

// LOGIN GURU
function bukaLoginGuru(){overlay.style.display="block";popupGuru.style.display="block";}
function tutupLoginGuru(){overlay.style.display="none";popupGuru.style.display="none";}

function loginGuru(){
  if(guruPass.value!=="ADMIN123") return alert("Password salah");
  user=guruNama.value;
  role="guru";
  loginBox.style.display="none";
  overlay.style.display="none";
  popupGuru.style.display="none";

  menuBox.innerHTML=`
  <div class="card">
  👨‍🏫 ${user}
  <button onclick="buatMapel()">➕ Buat Mapel</button>
  <button onclick="kelolaMapel()">⚙️ Kelola</button>
  <button onclick="lihatHasil()">📊 Hasil</button>
  </div>`;
}

// MAPEL
function buatMapel(){
  contentBox.innerHTML=`
  <div class="card">
  <input id="mapelInput" placeholder="Nama Mapel">
  <button onclick="simpanMapel()">Simpan</button>
  </div>`;
}

function simpanMapel(){
  let ref=db.ref("ulangan/mapel").push();
  ref.set({nama:mapelInput.value,lock:false});
  halamanTambahSoal(ref.key);
}

function toggleLock(id,lock){
  db.ref("ulangan/mapel/"+id+"/lock").set(!lock);
  kelolaMapel();
}

// KELOLA MAPEL + SOAL
function kelolaMapel(){
  db.ref("ulangan/mapel").once("value",snap=>{
    let html="";
    snap.forEach(s=>{
      let d=s.val();
      html+=`
      <div class="card">
      <b>${d.nama}</b><br>
      ${d.lock?"🔒 Terkunci":"🔓 Terbuka"}
      <button onclick="halamanTambahSoal('${s.key}')">Kelola Soal</button>
      <button onclick="toggleLock('${s.key}',${d.lock})">Toggle Lock</button>
      </div>`;
    });
    contentBox.innerHTML=html;
  });
}

// LOAD + EDIT SOAL
function halamanTambahSoal(id){
  currentMapel=id;
  db.ref("ulangan/mapel/"+id+"/soal").once("value",snap=>{
    let html="<div id='soalContainer'></div>";
    html+=`<button onclick="tambahSoal()">➕ Tambah</button>
           <button onclick="simpanSoal()">💾 Simpan</button>`;
    contentBox.innerHTML=html;

    let c=document.getElementById("soalContainer");
    snap.forEach(s=>{
      let d=s.val();
      let div=document.createElement("div");
      div.className="card soalCard";
      div.innerHTML=`
      <select class="tipe" onchange="ubahTipe(this)">
        <option value="pg" ${d.tipe=="pg"?"selected":""}>PG</option>
        <option value="isian" ${d.tipe=="isian"?"selected":""}>Isian</option>
      </select>
      <input class="soal" value="${d.soal}">
      <div class="pgBox" style="display:${d.tipe=="pg"?"block":"none"};">
        <input class="a" value="${d.a||""}">
        <input class="b" value="${d.b||""}">
        <input class="c" value="${d.c||""}">
        <input class="d" value="${d.d||""}">
        <select class="jawaban">
          <option ${d.benar=="A"?"selected":""}>A</option>
          <option ${d.benar=="B"?"selected":""}>B</option>
          <option ${d.benar=="C"?"selected":""}>C</option>
          <option ${d.benar=="D"?"selected":""}>D</option>
        </select>
      </div>
      <div class="isianBox" style="display:${d.tipe=="isian"?"block":"none"};">
        <input class="jawabanIsian" value="${d.benar||""}">
      </div>
      <button onclick="hapusSoal('${s.key}')">🗑️ Hapus</button>`;
      c.appendChild(div);
    });
  });
}

function hapusSoal(id){
  if(confirm("Hapus soal?")){
    db.ref("ulangan/mapel/"+currentMapel+"/soal/"+id).remove();
    halamanTambahSoal(currentMapel);
  }
}

function tambahSoal(){
  let div=document.createElement("div");
  div.className="card soalCard";
  div.innerHTML=`<select class="tipe" onchange="ubahTipe(this)">
  <option value="pg">PG</option><option value="isian">Isian</option>
  </select>
  <input class="soal">
  <div class="pgBox"><input class="a"><input class="b"><input class="c"><input class="d">
  <select class="jawaban"><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
  <div class="isianBox" style="display:none;"><input class="jawabanIsian"></div>`;
  soalContainer.appendChild(div);
}

function ubahTipe(el){
  let p=el.parentElement;
  p.querySelector(".pgBox").style.display=(el.value=="pg")?"block":"none";
  p.querySelector(".isianBox").style.display=(el.value=="isian")?"block":"none";
}

function simpanSoal(){
  let cards=document.querySelectorAll(".soalCard");
  db.ref("ulangan/mapel/"+currentMapel+"/soal").remove().then(()=>{
    cards.forEach(c=>{
      let tipe=c.querySelector(".tipe").value;
      let data={soal:c.querySelector(".soal").value,tipe:tipe};
      if(tipe=="pg"){
        data.a=c.querySelector(".a").value;
        data.b=c.querySelector(".b").value;
        data.c=c.querySelector(".c").value;
        data.d=c.querySelector(".d").value;
        data.benar=c.querySelector(".jawaban").value;
      } else {
        data.benar=c.querySelector(".jawabanIsian").value.toLowerCase();
      }
      db.ref("ulangan/mapel/"+currentMapel+"/soal").push(data);
    });
    alert("Tersimpan!");
  });
}

// MURID LOAD MAPEL
function loadMapel(){
  db.ref("ulangan/mapel").on("value",snap=>{
    let html="";
    snap.forEach(s=>{
      let d=s.val();
      html+=`<div class="card">${d.nama}<br>
      ${d.lock?"🔒 Dikunci":"🔓 Bisa"}
      ${!d.lock?`<button onclick="mulaiSoal('${s.key}','${d.nama}')">Mulai</button>`:""}
      </div>`;
    });
    contentBox.innerHTML=html;
  });
}

// RANDOM SOAL
function mulaiSoal(id,nama){
  currentMapel=id;
  db.ref("ulangan/mapel/"+id+"/soal").once("value",snap=>{
    soalRandom=[];
    snap.forEach(s=>soalRandom.push(s.val()));

    soalRandom.sort(()=>Math.random()-0.5);

    let html="<h3>"+nama+"</h3>";
    soalRandom.forEach((d,i)=>{
      html+=`<div class="card">${i+1}. ${d.soal}`;
      if(d.tipe=="pg"){
        let opsi=[
          {k:"A",t:d.a},{k:"B",t:d.b},
          {k:"C",t:d.c},{k:"D",t:d.d}
        ];
        opsi.sort(()=>Math.random()-0.5);
        d._opsi=opsi;

        opsi.forEach(o=>{
          html+=`<div class="option">
          <input type="radio" name="q${i}" value="${o.k}">${o.t}</div>`;
        });
      } else {
        html+=`<input id="q${i}">`;
      }
      html+="</div>";
    });

    html+=`<button onclick="kirimJawabanRandom('${nama}',${soalRandom.length})">Selesai</button>`;
    contentBox.innerHTML=html;
  });
}

// NILAI
function kirimJawabanRandom(mapel,total){
  let benar=0;
  soalRandom.forEach((d,i)=>{
    if(d.tipe=="pg"){
      let p=document.querySelector(`input[name=q${i}]:checked`);
      if(p && p.value==d.benar) benar++;
    } else {
      let isi=document.getElementById("q"+i).value.toLowerCase();
      let arr=d.benar.split(",");
      if(arr.includes(isi)) benar++;
    }
  });

  let nilai=Math.round((benar/total)*100);
  db.ref("ulangan/hasil").push({nama:user,kelas:kelas,mapel:mapel,nilai:nilai});

  contentBox.innerHTML=`<div class="card"><h2>Nilai: ${nilai}</h2></div>`;
}

// HASIL
function lihatHasil(){
  db.ref("ulangan/hasil").once("value",snap=>{
    let html="";
    snap.forEach(s=>{
      let d=s.val();
      html+=`<div class="card">${d.nama} (${d.kelas}) - ${d.nilai}</div>`;
    });
    contentBox.innerHTML=html;
  });
}

// ANTI CHEAT
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("visibilitychange",()=>{
  if(document.hidden && role=="murid"){
    alert("Keluar = auto submit!");
    kirimJawabanRandom("Auto",soalRandom.length||1);
  }
});
</script>

</body>
</html>
